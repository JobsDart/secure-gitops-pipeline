# Cluster admission policy: only allow images signed by THIS repo's pipeline.
# Enforced by Kyverno — an unsigned or untrusted image is rejected at deploy time,
# so even a compromised registry push cannot reach production.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signatures
spec:
  validationFailureAction: Enforce
  webhookTimeoutSeconds: 30
  rules:
    - name: verify-cosign-signature
      match:
        any:
          - resources:
              kinds: [Pod]
      verifyImages:
        - imageReferences:
            - "ghcr.io/jobsdart/secure-gitops-pipeline*"
          attestors:
            - entries:
                # Keyless: trust signatures from this repo's workflow identity.
                - keyless:
                    subject: "https://github.com/JobsDart/secure-gitops-pipeline/.github/workflows/secure-pipeline.yaml@refs/heads/main"
                    issuer: "https://token.actions.githubusercontent.com"
