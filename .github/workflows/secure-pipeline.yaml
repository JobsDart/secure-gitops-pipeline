name: Secure GitOps Pipeline

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write
  id-token: write          # keyless Cosign signing via GitHub OIDC
  security-events: write   # upload Trivy SARIF to code scanning

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-scan-sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: app
          load: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}

      # --- GATE 1: vulnerability scan. Fails the build on HIGH/CRITICAL CVEs. ---
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

      # --- Supply-chain provenance: SBOM. ---
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      # --- Publish + sign only from main (after gates pass). ---
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Install Cosign
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3

      # --- GATE 2: sign the image (keyless) + attest the SBOM. ---
      - name: Sign image (keyless / OIDC)
        if: github.ref == 'refs/heads/main'
        run: cosign sign --yes ${{ env.IMAGE }}:${{ github.sha }}

      - name: Attest SBOM
        if: github.ref == 'refs/heads/main'
        run: cosign attest --yes --type spdxjson --predicate sbom.spdx.json ${{ env.IMAGE }}:${{ github.sha }}

  deploy-and-verify:
    needs: build-scan-sign
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # GitOps: bump the image tag in Git; ArgoCD syncs the cluster. (Token-gated.)
      - name: Trigger ArgoCD sync
        run: |
          echo "argocd app sync app --grpc-web --server $ARGOCD_SERVER"
          echo "(configure ARGOCD_SERVER + ARGOCD_AUTH_TOKEN secrets to enable)"
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}

      # --- GATE 3: smoke/load test the deployed service. ---
      - name: Set up k6
        uses: grafana/setup-k6-action@v1
      - name: k6 smoke test
        run: k6 run load/smoke.js
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {"text": "Secure pipeline ${{ job.status }} for `${{ github.sha }}` (${{ github.repository }})"}
