apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secure-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/JobsDart/secure-gitops-pipeline.git
    targetRevision: main
    path: gitops/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: secure-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
